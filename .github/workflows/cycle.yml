name: Self-Improving Cycle

# Closes IGNITION_GAP: system now self-triggers without manual intervention.
# Runs on push to examples/ or scripts/, and on a 6-hour schedule.

on:
  push:
    paths:
      - 'examples/**'
      - 'scripts/**'
      - 'context_spinner.py'
      - 'apply_to_chat.py'
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  self-improving-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short
        continue-on-error: true  # tests failing should not block cycle execution

      - name: Run operator layer on example case
        run: python3 run_operator_layer.py examples/bundle_forensics_case
        continue-on-error: true  # log failure but do not fail the workflow

      - name: Generate human report
        run: python3 scripts/generate_human_report.py examples/bundle_forensics_case
        continue-on-error: true

      - name: Apply trust updates if enough samples
        run: |
          SAMPLE_COUNT=$(python3 -c "
import json, sys
from pathlib import Path
from collections import Counter
p = Path('learning_memory.jsonl')
if not p.exists():
    print(0)
    sys.exit(0)
lines = [l for l in p.read_text().splitlines() if l.strip()]
cats = Counter(json.loads(l).get('category', 'unknown') for l in lines)
print(min(cats.values()) if cats else 0)
")
          echo "Min samples per category: $SAMPLE_COUNT"
          if [ "$SAMPLE_COUNT" -ge 5 ]; then
            echo "Running trust_update --apply"
            python3 scripts/trust_update.py --apply
          else
            echo "Trust update skipped: only $SAMPLE_COUNT min samples per category (need 5)"
          fi
        continue-on-error: true

      - name: Commit cycle artifacts
        run: |
          git config user.name  "self-improving-cycle[bot]"
          git config user.email "cycle-bot@users.noreply.github.com"
          git add examples/ || true
          git add learning_memory.jsonl || true
          git add trust_adjustments.json || true
          git diff --cached --quiet || git commit -m "chore: cycle artifacts $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || true
        continue-on-error: true
